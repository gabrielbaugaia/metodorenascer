workflows:
  android-preview-workflow:
    name: Android Preview (Metodo Renascer)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
      java: 21
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Build web project and sync Android
        script: |
          npm run mobile:sync:android
      - name: Configure Android SDK
        script: |
          export JAVA_HOME="/Library/Java/JavaVirtualMachines/zulu-21.jdk/Contents/Home"
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36"
      - name: Build Android preview APK
        script: |
          export JAVA_HOME="/Library/Java/JavaVirtualMachines/zulu-21.jdk/Contents/Home"
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version
          cd android
          ./gradlew --version
          ./gradlew assembleDebug --stacktrace --no-daemon > ../gradle-android-preview.log 2>&1 || { tail -200 ../gradle-android-preview.log; exit 1; }
          tail -80 ../gradle-android-preview.log
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
      - gradle-android-preview.log

  android-workflow:
    name: Android Release (Metodo Renascer)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
      java: 21
      android_signing:
        - renascer_connect_release
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Build web project and sync Android
        script: |
          npm run mobile:sync:android
      - name: Configure Android SDK
        script: |
          export JAVA_HOME="/Library/Java/JavaVirtualMachines/zulu-21.jdk/Contents/Home"
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36"
      - name: Build Android App Bundle
        script: |
          export JAVA_HOME="/Library/Java/JavaVirtualMachines/zulu-21.jdk/Contents/Home"
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version
          cd android
          ./gradlew --version
          ./gradlew bundleRelease --stacktrace --no-daemon > ../gradle-android-release.log 2>&1 || { tail -200 ../gradle-android-release.log; exit 1; }
          tail -80 ../gradle-android-release.log
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - gradle-android-release.log

  ios-workflow:
    name: iOS Release (Metodo Renascer)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.renascer.connect
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Build web project and sync iOS
        script: |
          npm run mobile:sync:ios
      - name: Build iOS App
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa

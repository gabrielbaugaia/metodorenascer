workflows:
  android-workflow:
    name: Android Build (Método Renascer)
    max_build_duration: 60
    instance_type: linux
    environment:
      node: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Web Project
        script: |
          npm run build
      - name: Capacitor Sync
        script: |
          npx cap sync android
      - name: Build Android App
        script: |
          cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab

  ios-workflow:
    name: iOS Build (Método Renascer)
    max_build_duration: 60
    instance_type: mac_mini_m1
    # Removi a integração direta aqui para não travar a UI se não estiver configurada
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Web Project
        script: |
          npm run build
      - name: Capacitor Sync
        script: |
          npx cap sync ios
      - name: Update Pods
        script: |
          cd ios/App && pod install
      - name: Build iOS App
        script: |
          # A build de iOS sem chaves configuradas na UI do Codemagic irá falhar na assinatura,
          # mas o workflow agora aparece separado do Android.
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa

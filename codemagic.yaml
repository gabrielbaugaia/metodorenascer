workflows:
  android-preview-workflow:
    name: Android Preview (Metodo Renascer)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Build web project and sync Android
        script: |
          npm run mobile:sync:android
      - name: Configure Android SDK
        script: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36"
      - name: Build Android preview APK
        script: |
          cd android && ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk

  android-workflow:
    name: Android Release (Metodo Renascer)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
      android_signing:
        - renascer_connect_release
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Build web project and sync Android
        script: |
          npm run mobile:sync:android
      - name: Configure Android SDK
        script: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36"
      - name: Build Android App Bundle
        script: |
          cd android && ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab

  ios-workflow:
    name: iOS Release (Metodo Renascer)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.renascer.connect
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Build web project and sync iOS
        script: |
          npm run mobile:sync:ios
      - name: Build iOS App
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
